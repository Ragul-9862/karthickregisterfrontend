<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">

<h1 class="text-2xl mb-4">Registrations</h1>

<div id="list"></div>

<script>
async function loadUsers() {
  const res = await fetch("https://karthicksregisterbackend.onrender.com/api/users");
  const users = await res.json();

  const container = document.getElementById("list");

  users.forEach(u => {
    const div = document.createElement("div");
    div.className = "border p-3 mb-2";

    div.innerHTML = `
      <h2 class="text-lg font-bold">${u.name}</h2>
      <p>📞 ${u.phone}</p>
      <p>🎂 Age: ${u.age}</p>
      <p>⏰ Session: ${u.session}</p>
      <p>⚖️ Weight: ${u.weight || "-"}</p>
      <p>🎯 Goal: ${u.goalMin || "-"} - ${u.goalMax || "-"}</p>
    `;

    container.appendChild(div);
  });
}

loadUsers();
</script>

</body>
</html>
