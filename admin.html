<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }

    /* Glass Card Effect */
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Gradient Border Hover */
    .card-hover {
      transition: all 0.3s ease;
    }

    .card-hover:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Animated background */
    .bg-animated {
      background: linear-gradient(-45deg, #0f172a, #020617, #1e293b, #020617);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>

<body class="bg-animated text-white min-h-screen p-6">

  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <h4 class="text-3xl font-semibold tracking-wide">
      🚀 Registrations Dashboard
    </h1>
   <button onclick="loadUsers()" 
  class="flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-purple-500 to-pink-500 rounded-lg shadow-lg hover:scale-105 transition group">

  <!-- SVG Icon -->
  <svg 
    xmlns="http://www.w3.org/2000/svg" 
    class="w-5 h-5 group-hover:rotate-180 transition duration-500"
    fill="none" 
    viewBox="0 0 24 24" 
    stroke="currentColor"
  >
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
      d="M4 4v6h6M20 20v-6h-6M5.64 18.36A9 9 0 1118.36 5.64" />
  </svg>

</button>
  </div>

  <!-- Status -->
  <div id="status" class="mb-4 text-gray-300"></div>

  <!-- Grid -->
  <div id="list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

<script>
async function loadUsers() {
  const container = document.getElementById("list");
  const status = document.getElementById("status");

  container.innerHTML = "";
  status.innerHTML = "⏳ Loading users...";

  try {
    const res = await fetch("https://karthicksregisterbackend.onrender.com/api/users");
    const users = await res.json();

    if (!users.length) {
      status.innerHTML = "😕 No registrations found";
      return;
    }

    status.innerHTML = `✅ Loaded ${users.length} users`;

    users.forEach(u => {
      const div = document.createElement("div");

      div.className = "glass card-hover p-5 rounded-2xl";

      div.innerHTML = `
        <div class="flex justify-between items-center mb-3">
          <h2 class="text-xl font-semibold text-purple-400">${u.name}</h2>
          <span class="text-xs bg-purple-600 px-2 py-1 rounded-full">${u.session}</span>
        </div>

        <div class="space-y-2 text-sm text-gray-300">
          <p>📞 <span class="text-white">${u.phone}</span></p>
          <p>🎂 Age: <span class="text-white">${u.age}</span></p>
          <p>⚖️ Weight: <span class="text-white">${u.weight || "-"}</span></p>
          <p>🎯 Goal: 
            <span class="text-green-400">${u.goalMin || "-"}</span> 
            → 
            <span class="text-red-400">${u.goalMax || "-"}</span>
          </p>
        </div>

        
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    status.innerHTML = "❌ Failed to load users";
  }
}

loadUsers();
</script>

</body>
</html>
